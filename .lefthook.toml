[[remotes]]
git_url = "https://github.com/home-operations/.github"
ref = "main"
configs = ["lefthook.common.toml"]

# Generated chart artifacts are ignored by oxfmt. Excluding them avoids a
# failed hook when they are the only staged Markdown or JSON files.
[pre-commit.commands.format-markdown]
exclude = ["charts/speedtest-exporter/README.md"]

[pre-commit.commands.format-json]
exclude = ["charts/speedtest-exporter/values.schema.json"]

[pre-commit.commands.generate]
glob = [
  "charts/speedtest-exporter/Chart.yaml",
  "charts/speedtest-exporter/values.yaml",
  "charts/speedtest-exporter/README.md.gotmpl",
]
run = "mise run generate && git add charts/speedtest-exporter/README.md charts/speedtest-exporter/values.schema.json"

[pre-push.commands.test]
run = "mise run test"
