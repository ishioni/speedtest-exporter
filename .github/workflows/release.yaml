---
name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  image:
    name: Publish image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@9fbd8b31193ea9b7c82ed5d27527aef02eacf82b # v3.7.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.12.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest
      - name: Build and push
        id: build
        uses: docker/build-push-action@5cd64c11c943c725b81486e178f4f3e9c35eecf3 # v6.18.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
            REVISION=${{ github.sha }}
          sbom: true
          provenance: mode=max
      - name: Sign image
        uses: sigstore/cosign-installer@d58896d6a5c43a6236e09de42e6aaeea069becde # v3.9.0
      - name: Cosign image
        env:
          IMAGE: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

  helm:
    name: Publish Helm chart
    needs: image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Helm
        uses: azure/setup-helm@1a275c3f98a5f1b6c4b4d9a8b3b807f3429b0d78 # v4.3.1
      - name: Pin image digest
        env:
          IMAGE_DIGEST: ${{ needs.image.outputs.digest }}
        run: >-
          sed -i "s|digest: \"\"|digest: \"${IMAGE_DIGEST}\"|"
          charts/speedtest-exporter/values.yaml
      - name: Package Helm chart
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: helm package charts/speedtest-exporter --version "$RELEASE_TAG" --app-version "$RELEASE_TAG"
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Helm chart
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: helm push "speedtest-exporter-${RELEASE_TAG}.tgz" "oci://ghcr.io/${REPOSITORY_OWNER}/charts"
      - name: Install Cosign
        uses: sigstore/cosign-installer@d58896d6a5c43a6236e09de42e6aaeea069becde # v3.9.0
      - name: Sign Helm chart
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: cosign sign --yes "ghcr.io/${REPOSITORY_OWNER}/charts/speedtest-exporter:${RELEASE_TAG}"
